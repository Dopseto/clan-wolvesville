<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Howl</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Almendra:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌵</text></svg>"> 
    <style>
        :root {
            --bg: #1a1208;
            --parchment: #f2e8c9;
            --parchment-dark: #e8d9a8;
            --parchment-shadow: #c9b87a;
            --ink: #2c1a0e;
            --ink-light: #5c3d1e;
            --accent: #c47a2a;
            --accent-dark: #9b5e1a;
            --accent-light: #e8a44a;
            --red: #8b2010;
            --ok: #2d6a1e;
            --border: #a08040;
            --muted: #5a3c1e;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --radius: 4px;
            --radius-sm: 3px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Almendra', serif;
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(180,120,40,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(100,60,10,0.2) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            color: var(--ink);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 220px;
            background: #1e1408;
            background-image: linear-gradient(180deg, #2a1c0a 0%, #1a1008 100%);
            border-right: 2px solid var(--accent-dark);
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            z-index: 1;
            flex-shrink: 0;
            position: relative;
        }

        #sidebar::after {
            content: '';
            position: absolute;
            top: 0; right: -1px; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, transparent, var(--accent) 20%, var(--accent-light) 50%, var(--accent) 80%, transparent);
            opacity: 0.6;
        }

        .sidebar-header {
            padding: 28px 20px 22px;
            border-bottom: 1px solid rgba(196,122,42,0.3);
            text-align: center;
        }

        .sidebar-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(196,122,42,0.6));
        }

        .sidebar-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-light);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(196,122,42,0.4);
        }

        .sidebar-header .subtitle {
            font-family: 'Almendra', serif;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
            opacity: 0.7;
        }

        .nav-section {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: none;
            color: #a08050;
            border: none;
            text-align: left;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 400;
            transition: all 0.25s ease;
            letter-spacing: 1px;
            border-radius: var(--radius-sm);
            width: 100%;
            position: relative;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 2px;
            background: var(--accent);
            border-radius: 1px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .nav-btn:hover { background: rgba(196,122,42,0.08); color: var(--accent-light); }
        .nav-btn.activo { background: rgba(196,122,42,0.12); color: var(--accent-light); padding-left: 18px; }
        .nav-btn.activo::before { opacity: 1; }
        .nav-btn .nav-icon { font-size: 14px; opacity: 0.8; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(196,122,42,0.2);
            text-align: center;
        }

        .sidebar-footer p {
            font-size: 10px;
            color: rgba(160,128,80,0.4);
            letter-spacing: 1px;
            font-family: 'Cinzel', serif;
        }

        /* Wrapper del contenido */
        #contenido-wrapper {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Pergamino principal */
        #contenido {
            flex: 1;
            background: var(--parchment);
            background-image:
                url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='300' height='300' filter='url(%23noise)' opacity='0.07'/%3E%3C/svg%3E"),
                radial-gradient(ellipse at 15% 15%, rgba(255,245,200,0.7) 0%, transparent 40%),
                radial-gradient(ellipse at 85% 85%, rgba(180,140,70,0.35) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 10%, rgba(200,160,80,0.2) 0%, transparent 30%),
                radial-gradient(ellipse at 10% 90%, rgba(160,110,40,0.25) 0%, transparent 30%);
            border: 2px solid var(--border);
            border-radius: 2px;
            padding: 40px 48px;
            box-shadow: 
                var(--shadow),
                inset 0 0 60px rgba(180,140,60,0.1),
                inset 0 0 120px rgba(160,120,40,0.05);
            position: relative;
            overflow-y: auto;
        }

        /* Marco interior del pergamino */
        #contenido::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(160,128,64,0.25);
            border-radius: 1px;
            pointer-events: none;
            z-index: 0;
        }

        /* Manchas de óxido - esquina superior izquierda */
        #contenido::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                /* Mancha óxido esquina sup izq */
                radial-gradient(ellipse 60px 40px at 3% 3%, rgba(139,60,20,0.12) 0%, transparent 100%),
                /* Mancha óxido esquina sup der */
                radial-gradient(ellipse 80px 50px at 97% 2%, rgba(120,80,20,0.1) 0%, transparent 100%),
                /* Mancha óxido esquina inf izq */
                radial-gradient(ellipse 70px 60px at 2% 98%, rgba(100,60,10,0.13) 0%, transparent 100%),
                /* Mancha óxido esquina inf der */
                radial-gradient(ellipse 90px 55px at 98% 97%, rgba(139,80,20,0.11) 0%, transparent 100%),
                /* Mancha central sutil */
                radial-gradient(ellipse 200px 100px at 60% 40%, rgba(180,140,60,0.04) 0%, transparent 100%),
                /* Borde superior envejecido */
                linear-gradient(180deg, rgba(160,100,30,0.08) 0%, transparent 8%),
                /* Borde inferior envejecido */
                linear-gradient(0deg, rgba(140,90,20,0.1) 0%, transparent 6%),
                /* Borde izquierdo envejecido */
                linear-gradient(90deg, rgba(120,80,20,0.08) 0%, transparent 5%),
                /* Borde derecho envejecido */
                linear-gradient(270deg, rgba(130,85,20,0.08) 0%, transparent 5%);
        }

        /* Ornamentos de esquinas SVG */
        .corner-ornament {
            position: absolute;
            width: 40px;
            height: 40px;
            opacity: 0.35;
            z-index: 1;
            pointer-events: none;
        }
        .corner-tl { top: 14px; left: 14px; }
        .corner-tr { top: 14px; right: 14px; transform: scaleX(-1); }
        .corner-bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
        .corner-br { bottom: 14px; right: 14px; transform: scale(-1); }

        /* Todo el contenido real va encima del ::after */
        #contenido > *:not(.corner-ornament) { position: relative; z-index: 1; }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 24px;
            letter-spacing: 2px;
            text-align: center;
            position: relative;
            padding-bottom: 16px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        h3 {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--parchment-shadow), transparent);
            opacity: 0.5;
        }

        .card {
            background: rgba(255,250,230,0.5);
            border: 1px solid var(--parchment-shadow);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 
                2px 3px 8px rgba(100,70,20,0.12),
                inset 0 1px 0 rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Manchas internas en las cards */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 40px 30px at 95% 10%, rgba(139,60,20,0.06) 0%, transparent 100%),
                radial-gradient(ellipse 30px 25px at 5% 90%, rgba(120,70,20,0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .card p { color: var(--ink-light); font-size: 16px; line-height: 1.6; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        .stat {
            background: linear-gradient(135deg, rgba(255,248,220,0.8), rgba(240,220,160,0.6));
            border: 1px solid var(--parchment-shadow);
            padding: 16px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: 2px 3px 6px rgba(100,70,20,0.12), inset 0 1px 0 rgba(255,255,255,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .stat::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 30px; height: 30px;
            background: radial-gradient(ellipse at 100% 0%, rgba(139,60,20,0.07) 0%, transparent 100%);
        }

        .stat:hover { transform: translateY(-2px); box-shadow: 3px 5px 12px rgba(100,70,20,0.2); }

        .stat-valor {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Cinzel', serif;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: linear-gradient(180deg, rgba(200,160,80,0.3), rgba(180,140,60,0.2));
            padding: 10px 14px;
            text-align: left;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            border-bottom: 2px solid var(--parchment-shadow);
        }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(160,128,64,0.2);
            font-size: 15px;
            color: var(--ink-light);
        }

        tr:hover td { background: rgba(200,160,80,0.08); }
        tr:last-child td { border-bottom: none; }

        button {
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff8e8;
            border: 1px solid var(--accent-dark);
            box-shadow: 0 3px 8px rgba(100,60,10,0.3), inset 0 1px 0 rgba(255,220,120,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(180deg, var(--accent-light) 0%, var(--accent) 100%);
            transform: translateY(-1px);
            box-shadow: 0 5px 12px rgba(100,60,10,0.4);
        }

        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-tracker {
            background: transparent;
            color: var(--accent-dark);
            border: 1px solid var(--parchment-shadow);
            padding: 5px 12px;
            font-size: 10px;
        }

        .btn-tracker:hover {
            background: rgba(196,122,42,0.1);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .tag {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff8e8;
            padding: 2px 10px;
            border-radius: 2px;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
            letter-spacing: 1px;
            box-shadow: 0 2px 4px rgba(100,60,10,0.3);
        }

        .anuncio {
            padding: 14px 0;
            border-bottom: 1px solid rgba(160,128,64,0.25);
        }

        .anuncio:last-child { border-bottom: none; }
        .anuncio-autor { font-family: 'Cinzel', serif; font-weight: 600; font-size: 14px; color: var(--ink); }
        .anuncio-fecha { color: var(--muted); font-size: 12px; margin-left: 8px; font-style: italic; }
        .anuncio-msg { color: var(--ink-light); margin-top: 6px; font-size: 15px; line-height: 1.5; }

        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--parchment-shadow);
            background: rgba(255,252,235,0.8);
            color: var(--ink);
            font-family: 'Almendra', serif;
            font-size: 15px;
            resize: vertical;
            min-height: 80px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 12px;
            box-shadow: inset 0 2px 4px rgba(100,70,20,0.08);
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: inset 0 2px 4px rgba(100,70,20,0.08), 0 0 0 3px rgba(196,122,42,0.15);
        }

        textarea::placeholder { color: var(--muted); opacity: 0.6; }

        .cargando {
            color: var(--muted);
            font-style: italic;
            text-align: center;
            padding: 40px;
            font-family: 'Almendra', serif;
            font-size: 16px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.ok { background: #2d5a1e; color: #c8e8a0; border: 1px solid #4a8a2e; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .toast.error { background: #5a1e10; color: #e8a090; border: 1px solid #8a2e1e; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

        #contenido::-webkit-scrollbar { width: 6px; }
        #contenido::-webkit-scrollbar-track { background: rgba(160,128,64,0.1); }
        #contenido::-webkit-scrollbar-thumb { background: var(--parchment-shadow); border-radius: 3px; }

        #contenido-wrapper::-webkit-scrollbar { width: 6px; }
        #contenido-wrapper::-webkit-scrollbar-track { background: transparent; }
        #contenido-wrapper::-webkit-scrollbar-thumb { background: rgba(196,122,42,0.3); border-radius: 3px; }

        a { color: var(--accent-dark); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* =================== MÓVIL =================== */
        #topbar-mobile { display: none; }
        #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow: auto; }

            #topbar-mobile {
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: fixed;
                top: 0; left: 0; right: 0;
                height: 48px;
                background: #1e1408;
                border-bottom: 1px solid var(--accent-dark);
                padding: 0 14px;
                z-index: 100;
            }

            #topbar-mobile .topbar-left { display: flex; align-items: center; gap: 10px; }

            #btn-hamburguesa {
                background: none; border: none; cursor: pointer;
                padding: 4px 6px; font-size: 20px;
                color: var(--accent-light); line-height: 1;
            }

            #topbar-title {
                font-family: 'Cinzel', serif; font-size: 13px;
                font-weight: 700; color: var(--accent-light); letter-spacing: 2px;
            }

            #topbar-username {
                font-family: 'Cinzel', serif; font-size: 10px;
                color: rgba(160,128,80,0.7); letter-spacing: 1px;
            }

            #sidebar {
                position: fixed; top: 0; left: 0;
                height: 100vh; width: 220px;
                z-index: 101; min-height: unset;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            #sidebar.abierto { transform: translateX(0); }
            #sidebar-overlay.visible { display: block; }

            #contenido-wrapper {
                padding: 12px 10px;
                padding-top: 60px;
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
            }

            #contenido { padding: 20px 16px; overflow-y: visible; }

            h1 { font-size: 18px; margin-bottom: 16px; }
            h3 { font-size: 10px; }
            .card { padding: 14px 16px; margin-bottom: 14px; }
            .stat-valor { font-size: 20px; }
            .stat-label { font-size: 10px; }
            .grid { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
            td { padding: 7px 8px; font-size: 12px; }
            th { padding: 7px 8px; font-size: 9px; }
            .anuncio-autor { font-size: 12px; }
            .anuncio-msg { font-size: 13px; }
            .corner-ornament { display: none; }
            .toast { bottom: 16px; right: 12px; left: 12px; text-align: center; }
        }
    </style>
</head>
<body>

<div id="sidebar-overlay" onclick="cerrarSidebar()"></div>

<div id="topbar-mobile">
    <div class="topbar-left">
        <button id="btn-hamburguesa" onclick="toggleSidebar()">☰</button>
        <span id="topbar-title">🐺 CLAN</span>
    </div>
    <span id="topbar-username"></span>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <span class="sidebar-icon">🐺</span>
        <h2>Clan</h2>
        <p class="subtitle">Wolvesville</p>
    </div>
    <div class="nav-section">
        <button class="nav-btn activo" onclick="mostrarSeccion('inicio', this)"><span class="nav-icon">🏠</span> Inicio</button>
        <button class="nav-btn" onclick="mostrarSeccion('miembros', this)"><span class="nav-icon">👥</span> Miembros</button>
        <button class="nav-btn" onclick="mostrarSeccion('logs', this)"><span class="nav-icon">📋</span> Registros</button>
        <button class="nav-btn" onclick="mostrarSeccion('stats', this)"><span class="nav-icon">📊</span> Estadísticas</button>
    </div>
    <div class="sidebar-footer">
        <p>✦ &nbsp; ✦ &nbsp; ✦</p>
    </div>
</div>

<div id="contenido-wrapper">
    <div id="contenido">
        <!-- Ornamentos de esquinas -->
        <svg class="corner-ornament corner-tl" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L2,20 Q2,2 20,2 Z" fill="none" stroke="#9b5e1a" stroke-width="1.5"/>
            <path d="M2,2 L12,2 M2,2 L2,12" stroke="#9b5e1a" stroke-width="1" fill="none"/>
            <circle cx="2" cy="2" r="2" fill="#9b5e1a"/>
            <circle cx="14" cy="2" r="1" fill="#9b5e1a" opacity="0.5"/>
            <circle cx="2" cy="14" r="1" fill="#9b5e1a" opacity="0.5"/>
        </svg>
        <svg class="corner-ornament corner-tr" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L2,20 Q2,2 20,2 Z" fill="none" stroke="#9b5e1a" stroke-width="1.5"/>
            <path d="M2,2 L12,2 M2,2 L2,12" stroke="#9b5e1a" stroke-width="1" fill="none"/>
            <circle cx="2" cy="2" r="2" fill="#9b5e1a"/>
            <circle cx="14" cy="2" r="1" fill="#9b5e1a" opacity="0.5"/>
            <circle cx="2" cy="14" r="1" fill="#9b5e1a" opacity="0.5"/>
        </svg>
        <svg class="corner-ornament corner-bl" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M2,2 L2,20 Q2,2 20,2 Z" fill="none" stroke="#9b5e1a" stroke-width="1.5"/>
            <path d="M2,2 L12,2 M2,2 L2,12" stroke="#9b5e1a" stroke-width="1" fill="none"/>
