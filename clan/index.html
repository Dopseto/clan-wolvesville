<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clan Wolvesville</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1208;
            --parchment: #f2e8c9;
            --parchment-dark: #e8d9a8;
            --parchment-shadow: #c9b87a;
            --ink: #2c1a0e;
            --ink-light: #5c3d1e;
            --accent: #c47a2a;
            --accent-dark: #9b5e1a;
            --accent-light: #e8a44a;
            --red: #8b2010;
            --ok: #2d6a1e;
            --border: #a08040;
            --muted: #7a5c2e;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --radius: 4px;
            --radius-sm: 3px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Crimson Text', serif;
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(180,120,40,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(100,60,10,0.2) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            color: var(--ink);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 220px;
            background: #1e1408;
            background-image: 
                linear-gradient(180deg, #2a1c0a 0%, #1a1008 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            border-right: 2px solid var(--accent-dark);
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            z-index: 1;
            flex-shrink: 0;
            position: relative;
        }

        /* Decoración lateral izquierda */
        #sidebar::after {
            content: '';
            position: absolute;
            top: 0; right: -1px; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, transparent, var(--accent) 20%, var(--accent-light) 50%, var(--accent) 80%, transparent);
            opacity: 0.6;
        }

        .sidebar-header {
            padding: 28px 20px 22px;
            border-bottom: 1px solid rgba(196,122,42,0.3);
            text-align: center;
        }

        .sidebar-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(196,122,42,0.6));
        }

        .sidebar-header h2 {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-light);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(196,122,42,0.4);
        }

        .sidebar-header .subtitle {
            font-family: 'Crimson Text', serif;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
            opacity: 0.7;
        }

        .nav-section {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: none;
            color: #a08050;
            border: none;
            text-align: left;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 400;
            transition: all 0.25s ease;
            letter-spacing: 1px;
            border-radius: var(--radius-sm);
            width: 100%;
            position: relative;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 2px;
            background: var(--accent);
            border-radius: 1px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .nav-btn:hover {
            background: rgba(196,122,42,0.08);
            color: var(--accent-light);
        }

        .nav-btn.activo {
            background: rgba(196,122,42,0.12);
            color: var(--accent-light);
            padding-left: 18px;
        }

        .nav-btn.activo::before { opacity: 1; }

        .nav-btn .nav-icon { font-size: 14px; opacity: 0.8; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(196,122,42,0.2);
            text-align: center;
        }

        .sidebar-footer p {
            font-size: 10px;
            color: rgba(160,128,80,0.4);
            letter-spacing: 1px;
            font-family: 'Cinzel', serif;
        }

        /* Contenido principal - pergamino */
        #contenido-wrapper {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        #contenido {
            flex: 1;
            background: var(--parchment);
            background-image:
                url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='300' height='300' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E"),
                radial-gradient(ellipse at 30% 20%, rgba(255,245,200,0.6) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(200,170,100,0.3) 0%, transparent 40%);
            border: 2px solid var(--border);
            border-radius: 2px;
            padding: 40px 48px;
            box-shadow: 
                var(--shadow),
                inset 0 0 60px rgba(180,140,60,0.1),
                inset 0 0 120px rgba(160,120,40,0.05);
            position: relative;
            overflow-y: auto;
        }

        /* Bordes decorativos del pergamino */
        #contenido::before {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(160,128,64,0.3);
            border-radius: 1px;
            pointer-events: none;
        }

        /* Esquinas decorativas */
        #contenido::after {
            content: '✦';
            position: absolute;
            top: 14px; left: 14px;
            color: var(--border);
            font-size: 12px;
            opacity: 0.5;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 24px;
            letter-spacing: 2px;
            text-align: center;
            position: relative;
            padding-bottom: 16px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        h3 {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--parchment-shadow), transparent);
            opacity: 0.5;
        }

        /* Cards */
        .card {
            background: rgba(255,250,230,0.6);
            border: 1px solid var(--parchment-shadow);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 
                2px 3px 8px rgba(100,70,20,0.15),
                inset 0 1px 0 rgba(255,255,255,0.5);
            position: relative;
        }

        .card p { color: var(--ink-light); font-size: 16px; line-height: 1.6; }

        /* Grid stats */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        .stat {
            background: linear-gradient(135deg, rgba(255,248,220,0.8), rgba(240,220,160,0.6));
            border: 1px solid var(--parchment-shadow);
            padding: 16px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: 2px 3px 6px rgba(100,70,20,0.12), inset 0 1px 0 rgba(255,255,255,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat:hover {
            transform: translateY(-2px);
            box-shadow: 3px 5px 12px rgba(100,70,20,0.2);
        }

        .stat-valor {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-dark);
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Cinzel', serif;
        }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; }

        th {
            background: linear-gradient(180deg, rgba(200,160,80,0.3), rgba(180,140,60,0.2));
            padding: 10px 14px;
            text-align: left;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            border-bottom: 2px solid var(--parchment-shadow);
        }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(160,128,64,0.2);
            font-size: 15px;
            color: var(--ink-light);
        }

        tr:hover td { background: rgba(200,160,80,0.08); }
        tr:last-child td { border-bottom: none; }

        /* Botones */
        button {
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff8e8;
            border: 1px solid var(--accent-dark);
            box-shadow: 0 3px 8px rgba(100,60,10,0.3), inset 0 1px 0 rgba(255,220,120,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(180deg, var(--accent-light) 0%, var(--accent) 100%);
            transform: translateY(-1px);
            box-shadow: 0 5px 12px rgba(100,60,10,0.4);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-tracker {
            background: transparent;
            color: var(--accent-dark);
            border: 1px solid var(--parchment-shadow);
            padding: 5px 12px;
            font-size: 10px;
        }

        .btn-tracker:hover {
            background: rgba(196,122,42,0.1);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* Tag */
        .tag {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff8e8;
            padding: 2px 10px;
            border-radius: 2px;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
            letter-spacing: 1px;
            box-shadow: 0 2px 4px rgba(100,60,10,0.3);
        }

        /* Anuncios */
        .anuncio {
            padding: 14px 0;
            border-bottom: 1px solid rgba(160,128,64,0.25);
        }

        .anuncio:last-child { border-bottom: none; }

        .anuncio-autor {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--ink);
        }

        .anuncio-fecha {
            color: var(--muted);
            font-size: 12px;
            margin-left: 8px;
            font-style: italic;
        }

        .anuncio-msg {
            color: var(--ink-light);
            margin-top: 6px;
            font-size: 15px;
            line-height: 1.5;
        }

        /* Textarea */
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--parchment-shadow);
            background: rgba(255,252,235,0.8);
            color: var(--ink);
            font-family: 'Crimson Text', serif;
            font-size: 15px;
            resize: vertical;
            min-height: 80px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 12px;
            box-shadow: inset 0 2px 4px rgba(100,70,20,0.08);
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: inset 0 2px 4px rgba(100,70,20,0.08), 0 0 0 3px rgba(196,122,42,0.15);
        }

        textarea::placeholder { color: var(--muted); opacity: 0.6; }

        /* Cargando */
        .cargando {
            color: var(--muted);
            font-style: italic;
            text-align: center;
            padding: 40px;
            font-family: 'Crimson Text', serif;
            font-size: 16px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.ok { background: #2d5a1e; color: #c8e8a0; border: 1px solid #4a8a2e; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .toast.error { background: #5a1e10; color: #e8a090; border: 1px solid #8a2e1e; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

        /* Scrollbars */
        #contenido::-webkit-scrollbar { width: 6px; }
        #contenido::-webkit-scrollbar-track { background: rgba(160,128,64,0.1); }
        #contenido::-webkit-scrollbar-thumb { background: var(--parchment-shadow); border-radius: 3px; }

        #contenido-wrapper::-webkit-scrollbar { width: 6px; }
        #contenido-wrapper::-webkit-scrollbar-track { background: transparent; }
        #contenido-wrapper::-webkit-scrollbar-thumb { background: rgba(196,122,42,0.3); border-radius: 3px; }

        a { color: var(--accent-dark); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <span class="sidebar-icon">🐺</span>
        <h2>Clan</h2>
        <p class="subtitle">Wolvesville</p>
    </div>
    <div class="nav-section">
        <button class="nav-btn activo" onclick="mostrarSeccion('inicio', this)"><span class="nav-icon">🏠</span> Inicio</button>
        <button class="nav-btn" onclick="mostrarSeccion('miembros', this)"><span class="nav-icon">👥</span> Miembros</button>
        <button class="nav-btn" onclick="mostrarSeccion('logs', this)"><span class="nav-icon">📋</span> Registros</button>
        <button class="nav-btn" onclick="mostrarSeccion('stats', this)"><span class="nav-icon">📊</span> Estadísticas</button>
        <button class="nav-btn" onclick="window.location.href='/tracker/'"><span class="nav-icon">🔍</span> Tracker</button>
    </div>
    <div class="sidebar-footer">
        <p>✦ &nbsp; ✦ &nbsp; ✦</p>
    </div>
</div>

<div id="contenido-wrapper">
    <div id="contenido">
        <p class="cargando">Cargando pergamino...</p>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/clan/script.js"></script>
</body>
</html>
