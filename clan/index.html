<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clan Wolvesville</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0f1a;
            --surface: #161828;
            --surface2: #1e2035;
            --sidebar: #12142a;
            --accent: #e94560;
            --accent2: #f5a623;
            --ok: #2ecc71;
            --text: #e8eaf0;
            --muted: #7b7f96;
            --border: rgba(233,69,96,0.12);
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --radius: 14px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 10% 10%, rgba(233,69,96,0.05) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar */
        #sidebar {
            width: 210px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 100vh;
            z-index: 1;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .sidebar-header h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
        }

        .sidebar-header h2 span {
            color: var(--accent);
        }

        .sidebar-icon {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
            filter: drop-shadow(0 0 10px rgba(233,69,96,0.4));
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 20px;
            background: none;
            color: var(--muted);
            border: none;
            text-align: left;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            border-radius: 0;
            letter-spacing: 0.2px;
            margin: 0 8px;
            border-radius: var(--radius-sm);
            width: calc(100% - 16px);
        }

        .nav-btn:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-btn.activo {
            background: rgba(233,69,96,0.15);
            color: var(--accent);
            border-left: 3px solid var(--accent);
            padding-left: 17px;
        }

        .nav-btn .nav-icon { font-size: 16px; }

        /* Contenido */
        #contenido {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }

        .card:hover { border-color: rgba(233,69,96,0.25); }

        /* Grid stats */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        .stat {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 18px;
            border-radius: var(--radius);
            text-align: center;
            transition: border-color 0.2s, transform 0.2s;
        }

        .stat:hover {
            border-color: rgba(233,69,96,0.3);
            transform: translateY(-2px);
        }

        .stat-valor {
            font-family: 'Rajdhani', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; }

        th {
            background: var(--surface2);
            padding: 12px 14px;
            text-align: left;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        th:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
        th:last-child { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 14px;
        }

        tr:hover td { background: rgba(255,255,255,0.02); }
        tr:last-child td { border-bottom: none; }

        /* Botones */
        button {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 3px 10px rgba(233,69,96,0.3);
        }

        .btn-primary:hover {
            background: #c73652;
            transform: translateY(-1px);
            box-shadow: 0 5px 14px rgba(233,69,96,0.4);
        }

        .btn-tracker {
            background: transparent;
            color: var(--accent2);
            border: 1px solid rgba(245,166,35,0.3);
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-tracker:hover {
            background: rgba(245,166,35,0.1);
            border-color: var(--accent2);
            transform: translateY(-1px);
        }

        /* Tag */
        .tag {
            display: inline-block;
            background: rgba(233,69,96,0.2);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 8px;
            border: 1px solid rgba(233,69,96,0.3);
        }

        /* Anuncios */
        .anuncio {
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .anuncio:last-child { border-bottom: none; }

        .anuncio-autor {
            font-weight: 700;
            font-size: 14px;
        }

        .anuncio-fecha {
            color: var(--muted);
            font-size: 12px;
            margin-left: 8px;
        }

        .anuncio-msg {
            color: #c8cad8;
            margin-top: 5px;
            font-size: 14px;
        }

        /* Cargando */
        .cargando {
            color: var(--muted);
            font-style: italic;
            text-align: center;
            padding: 40px;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Scrollbar */
        #contenido::-webkit-scrollbar { width: 6px; }
        #contenido::-webkit-scrollbar-track { background: transparent; }
        #contenido::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <span class="sidebar-icon">🐺</span>
        <h2>Clan <span>WV</span></h2>
    </div>
    <button class="nav-btn activo" onclick="mostrarSeccion('inicio', this)"><span class="nav-icon">🏠</span> Inicio</button>
    <button class="nav-btn" onclick="mostrarSeccion('miembros', this)"><span class="nav-icon">👥</span> Miembros</button>
    <button class="nav-btn" onclick="mostrarSeccion('logs', this)"><span class="nav-icon">📋</span> Logs</button>
    <button class="nav-btn" onclick="mostrarSeccion('stats', this)"><span class="nav-icon">📊</span> Estadísticas</button>
    <button class="nav-btn" onclick="window.location.href='/tracker/'"><span class="nav-icon">🔍</span> Tracker</button>
</div>

<div id="contenido">
    <p class="cargando">Cargando...</p>
</div>

<script src="/clan/script.js"></script>
</body>
</html>
