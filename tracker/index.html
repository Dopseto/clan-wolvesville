<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wolvesville Name Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0f1a;
            --surface: #161828;
            --surface2: #1e2035;
            --accent: #e94560;
            --accent2: #f5a623;
            --ok: #2ecc71;
            --text: #e8eaf0;
            --muted: #7b7f96;
            --border: rgba(233,69,96,0.15);
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --radius: 14px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* Fondo con textura sutil */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 20%, rgba(233,69,96,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(15,52,96,0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        header .icon {
            font-size: 36px;
            filter: drop-shadow(0 0 12px rgba(233,69,96,0.5));
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--accent);
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: rgba(233,69,96,0.3);
        }

        .card h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
        }

        /* Inputs */
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type=text] {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255,255,255,0.08);
            background: var(--surface2);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input[type=text]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(233,69,96,0.15);
        }

        input[type=text]::placeholder {
            color: var(--muted);
        }

        /* Botones */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(233,69,96,0.3);
        }

        .btn-primary:hover {
            background: #c73652;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(233,69,96,0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .btn-secondary:hover {
            background: #252840;
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }

        .btn-verificar {
            background: transparent;
            color: var(--accent2);
            border: 1px solid rgba(245,166,35,0.3);
        }

        .btn-verificar:hover {
            background: rgba(245,166,35,0.1);
            border-color: var(--accent2);
            transform: translateY(-1px);
        }

        /* Lista jugadores */
        ul { list-style: none; padding: 0; }

        li {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 8px;
            transition: border-color 0.2s, background 0.2s;
        }

        li:hover {
            border-color: rgba(233,69,96,0.2);
            background: #1f2238;
        }

        .jugador-fila {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .jugador-nombre {
            font-weight: 600;
            font-size: 15px;
        }

        .jugador-num {
            color: var(--muted);
            font-size: 13px;
            margin-right: 6px;
        }

        .jugador-acciones {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nota-input {
            width: 180px !important;
            min-width: unset !important;
            padding: 6px 12px !important;
            font-size: 13px !important;
        }

        /* Footer de la lista */
        .lista-footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* Resultado */
        #resultado { margin-top: 16px; }

        .resultado-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .resultado-card p {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 14px;
        }

        .resultado-card p:last-child { border-bottom: none; }

        .resultado-card b {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-right: 8px;
        }

        .aviso {
            color: var(--accent2);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }

        .ok {
            color: var(--ok);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }

        .cargando {
            color: var(--muted);
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .error { color: #ff6b6b; }

        /* Confirmacion guardado */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--ok);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(46,204,113,0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="icon">🐺</div>
            <h1>Name <span>Tracker</span></h1>
        </header>

        <div class="card">
            <h3>Buscar por nombre</h3>
            <div class="input-row">
                <input type="text" id="inputNombre" placeholder="Nombre del jugador"/>
                <button class="btn-primary" onclick="buscarPorNombre()">Buscar</button>
            </div>
        </div>

        <div class="card">
            <h3>Buscar por ID</h3>
            <div class="input-row">
                <input type="text" id="inputID" placeholder="ID del jugador"/>
                <button class="btn-primary" onclick="buscarPorID()">Buscar</button>
            </div>
        </div>

        <div class="card">
            <h3>Jugadores guardados</h3>
            <ul id="listaJugadores">
                <li><p class="cargando">Cargando...</p></li>
            </ul>
            <div class="lista-footer">
                <button class="btn-secondary" onclick="verificarTodos()">🔄 Verificar cambios en todos</button>
            </div>
        </div>

        <div id="resultado"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/tracker/script.js"></script>
</body>
</html>
