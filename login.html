<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clan Wolvesville — Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Almendra:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌵</text></svg>">
    <style>
        :root {
            --bg: #1a1208;
            --parchment: #f2e8c9;
            --parchment-dark: #e8d9a8;
            --parchment-shadow: #c9b87a;
            --ink: #2c1a0e;
            --ink-light: #5c3d1e;
            --accent: #c47a2a;
            --accent-dark: #9b5e1a;
            --accent-light: #e8a44a;
            --red: #8b2010;
            --ok: #2d6a1e;
            --border: #a08040;
            --muted: #5a3c1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Almendra', serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(180,120,40,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(100,60,10,0.2) 0%, transparent 50%);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .pergamino {
            background: var(--parchment);
            background-image:
                radial-gradient(ellipse at 15% 15%, rgba(255,245,200,0.7) 0%, transparent 40%),
                radial-gradient(ellipse at 85% 85%, rgba(180,140,70,0.35) 0%, transparent 40%);
            border: 2px solid var(--border);
            border-radius: 2px;
            padding: 44px 40px 36px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 0 60px rgba(180,140,60,0.1);
            position: relative;
        }

        .pergamino::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(160,128,64,0.25);
            border-radius: 1px;
            pointer-events: none;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 44px;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(196,122,42,0.5));
        }

        .logo h1 {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .logo p {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
            opacity: 0.7;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--parchment-shadow), transparent);
        }

        .divider span {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            color: var(--accent-dark);
        }

        /* Tabs */
        .tabs {
            display: flex;
            border: 1px solid var(--parchment-shadow);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 9px;
            border: none;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .tab-btn.activo {
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff8e8;
            box-shadow: inset 0 1px 0 rgba(255,220,120,0.3);
        }

        .tab-btn:not(.activo) {
            background: rgba(255,252,235,0.5);
            color: var(--muted);
        }

        .tab-btn:not(.activo):hover {
            background: rgba(196,122,42,0.1);
            color: var(--accent-dark);
        }

        /* Formularios */
        .form-panel { display: none; }
        .form-panel.activo { display: block; }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: 1.5px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--parchment-shadow);
            border-radius: 3px;
            background: rgba(255,252,235,0.8);
            color: var(--ink);
            font-family: 'Almendra', serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 2px 4px rgba(100,70,20,0.06);
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: inset 0 2px 4px rgba(100,70,20,0.06), 0 0 0 3px rgba(196,122,42,0.15);
        }

        .field input::placeholder { color: var(--muted); opacity: 0.5; }

        .btn-submit {
            width: 100%;
            padding: 11px;
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff8e8;
            border: 1px solid var(--accent-dark);
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 3px 8px rgba(100,60,10,0.3), inset 0 1px 0 rgba(255,220,120,0.3);
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: linear-gradient(180deg, var(--accent-light) 0%, var(--accent) 100%);
            transform: translateY(-1px);
            box-shadow: 0 5px 14px rgba(100,60,10,0.4);
        }

        .btn-submit:active { transform: translateY(0); }

        .mensaje {
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 3px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .mensaje.error { background: rgba(139,32,16,0.1); color: var(--red); border: 1px solid rgba(139,32,16,0.2); display: block; }
        .mensaje.ok { background: rgba(45,106,30,0.1); color: var(--ok); border: 1px solid rgba(45,106,30,0.2); display: block; }
        .mensaje.pendiente { background: rgba(196,122,42,0.1); color: var(--accent-dark); border: 1px solid rgba(196,122,42,0.2); display: block; }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="pergamino">
        <div class="logo">
            <span class="logo-icon">🐺</span>
            <h1>Clan</h1>
            <p>Wolvesville</p>
        </div>

        <div class="divider"><span>✦</span></div>

        <div class="tabs">
            <button class="tab-btn activo" onclick="switchTab('login')">Ingresar</button>
            <button class="tab-btn" onclick="switchTab('registro')">Registrarse</button>
        </div>

        <!-- LOGIN -->
        <div class="form-panel activo" id="panel-login">
            <div class="field">
                <label>Usuario</label>
                <input type="text" id="login-user" placeholder="Tu nombre de usuario" autocomplete="username"/>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
            </div>
            <button class="btn-submit" onclick="hacerLogin()">Entrar al clan</button>
            <div class="mensaje" id="login-msg"></div>
        </div>

        <!-- REGISTRO -->
        <div class="form-panel" id="panel-registro">
            <div class="field">
                <label>Usuario</label>
                <input type="text" id="reg-user" placeholder="Elegí un nombre de usuario" autocomplete="username"/>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password"/>
            </div>
            <div class="field">
                <label>Confirmar contraseña</label>
                <input type="password" id="reg-pass2" placeholder="••••••••" autocomplete="new-password"/>
            </div>
            <button class="btn-submit" onclick="hacerRegistro()">Solicitar acceso</button>
            <div class="mensaje" id="reg-msg"></div>
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('activo', (tab === 'login' && i === 0) || (tab === 'registro' && i === 1))
    })
    document.getElementById('panel-login').classList.toggle('activo', tab === 'login')
    document.getElementById('panel-registro').classList.toggle('activo', tab === 'registro')
}

function mostrarMsg(id, texto, tipo) {
    const el = document.getElementById(id)
    el.textContent = texto
    el.className = `mensaje ${tipo}`
}

async function hacerLogin() {
    const username = document.getElementById('login-user').value.trim()
    const password = document.getElementById('login-pass').value
    if (!username || !password) { mostrarMsg('login-msg', 'Completá todos los campos', 'error'); return }

    const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    })
    const data = await res.json()
    if (data.ok) {
        window.location.href = '/clan/'
    } else if (data.suspendido) {
        mostrarMsg('login-msg', '⛔ Cuenta temporalmente suspendida', 'error')
    } else if (data.pendiente) {
        mostrarMsg('login-msg', '⏳ Tu cuenta está pendiente de aprobación', 'pendiente')
    } else {
        mostrarMsg('login-msg', data.error || 'Usuario o contraseña incorrectos', 'error')
    }
}

async function hacerRegistro() {
    const username = document.getElementById('reg-user').value.trim()
    const password = document.getElementById('reg-pass').value
    const password2 = document.getElementById('reg-pass2').value
    if (!username || !password) { mostrarMsg('reg-msg', 'Completá todos los campos', 'error'); return }
    if (password !== password2) { mostrarMsg('reg-msg', 'Las contraseñas no coinciden', 'error'); return }
    if (password.length < 4) { mostrarMsg('reg-msg', 'La contraseña debe tener al menos 4 caracteres', 'error'); return }

    const res = await fetch('/auth/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    })
    const data = await res.json()
    if (data.ok) {
        mostrarMsg('reg-msg', '✓ Solicitud enviada. Esperá que el admin te apruebe.', 'ok')
        document.getElementById('reg-user').value = ''
        document.getElementById('reg-pass').value = ''
        document.getElementById('reg-pass2').value = ''
    } else {
        mostrarMsg('reg-msg', data.error || 'Error al registrarse', 'error')
    }
}

// Enter para login
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const panelLogin = document.getElementById('panel-login')
        if (panelLogin.classList.contains('activo')) hacerLogin()
        else hacerRegistro()
    }
})
</script>
</body>
</html>
